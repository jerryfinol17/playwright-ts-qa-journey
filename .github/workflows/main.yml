name: CI - Playwright Sauce Demo Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - webkit
          - edge
          - iPhone 13
          - Pixel 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers + deps
        run: npx playwright install --with-deps

      - name: Run tests on ${{ matrix.project }}
        run: npx playwright test --project="${{ matrix.project }}"
        env:
          CI: "true"

      # ==================== ARTIFACTS ====================
      - name: Upload HTML Report - ${{ matrix.project }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Monocart Report - ${{ matrix.project }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monocart-report-${{ matrix.project }}
          path: coverage-report/
          retention-days: 30

      - name: Upload Failure Artifacts - ${{ matrix.project }}
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-${{ matrix.project }}
          path: |
            test-results/
            videos/
            screenshots/
          retention-days: 14